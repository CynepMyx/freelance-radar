name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: oleg
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/freelance-radar/repo
            git pull origin main
            docker compose up --build -d
            docker image prune -f
