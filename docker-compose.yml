version: "3.9"

services:
  freelance-radar:
    build: .
    container_name: freelance-radar
    restart: unless-stopped
    env_file:
      - app.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fr-net
    volumes:
      - ./data:/app/data
    command: ["python", "-u", "monitor.py"]

  redis:
    image: redis:7-alpine
    container_name: fr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - fr-redis-data:/data
    networks:
      - fr-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: fr-postgres
    restart: unless-stopped
    env_file:
      - app.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freelance_radar}
      POSTGRES_USER: ${POSTGRES_USER:-fr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - fr-postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fr-net
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fr_user} -d ${POSTGRES_DB:-freelance_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fr-net:
    driver: bridge

volumes:
  fr-redis-data:
  fr-postgres-data:
